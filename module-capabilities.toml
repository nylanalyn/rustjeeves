# Operator-owned WASM host capability policy. Unknown modules receive only log, theme, and now.
# Grant bot_reload/bot_refresh/bot_shutdown only to modules whose code you fully trust.

[admin]
capabilities = [
  "send_message", "log", "theme", "commands_list",
  "bot_reload", "bot_refresh", "bot_shutdown",
]

[operator]
capabilities = ["send_message", "theme", "log", "now", "schedule", "channel_operator"]

[users]
capabilities = [
  "send_message", "theme", "profile_ensure", "profile_get", "profile_set",
  "profile_clear", "geocode", "award_stats",
]

[weather]
capabilities = [
  "send_message", "theme", "profile_get", "geocode", "weather", "kv_get", "kv_set",
  "award_stats",
]

