# Operator-owned WASM host capability policy. Unknown modules receive only log, theme, and now.
# Grant bot_reload/bot_refresh/bot_shutdown only to modules whose code you fully trust.

[admin]
capabilities = [
  "send_message", "log", "theme",
  "bot_reload", "bot_refresh", "bot_shutdown",
]

[users]
capabilities = [
  "send_message", "theme", "profile_ensure", "profile_get", "profile_set",
  "profile_clear", "geocode",
]

[weather]
capabilities = ["send_message", "theme", "profile_get", "geocode", "weather"]

[clock]
capabilities = ["send_message", "theme", "profile_get", "profile_set", "geocode", "local_time"]

[fishing]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "now"]

[search]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "now", "web_search"]

[history]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "profile_get", "now"]

[memos]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "profile_get", "now", "setting_get"]

[reminders]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now", "setting_get", "schedule",
]

[translate]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "now", "translate"]

[wordle]
capabilities = ["send_message", "kv_get", "kv_set", "now"]
