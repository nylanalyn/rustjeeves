# Operator-owned WASM host capability policy. Unknown modules receive only log, theme, and now.
# Grant bot_reload/bot_refresh/bot_shutdown only to modules whose code you fully trust.

[admin]
capabilities = [
  "send_message", "log", "theme", "commands_list",
  "bot_reload", "bot_refresh", "bot_shutdown",
]

[users]
capabilities = [
  "send_message", "theme", "profile_ensure", "profile_get", "profile_set",
  "profile_clear", "geocode",
]

[weather]
capabilities = ["send_message", "theme", "profile_get", "geocode", "weather"]

[clock]
capabilities = ["send_message", "theme", "profile_get", "profile_set", "geocode", "local_time"]

[fishing]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now", "irc_casefold", "random_bytes",
  "profile_get",
]

[search]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "now", "web_search"]

[history]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "profile_get", "now", "setting_get"]

[memos]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "profile_get", "now", "setting_get", "log",
  "irc_casefold",
]

[reminders]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now", "setting_get", "schedule",
]

[translate]
capabilities = ["send_message", "theme", "kv_get", "kv_set", "now", "translate"]

[ai]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now",
  "setting_get", "ai_chat", "bot_nick",
]

[youtube]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now", "setting_get",
  "youtube_lookup", "youtube_search", "bot_nick",
]

[banter]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now", "setting_get", "bot_nick",
]

[wordle]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now", "setting_get", "random_bytes",
]

[roadtrip]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now",
  "setting_get", "random_bytes", "schedule",
]

[hunt]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now",
  "setting_get", "random_bytes", "schedule", "irc_casefold",
]

[darts]
capabilities = [
  "send_message", "theme", "kv_get", "kv_set", "now",
  "setting_get", "random_bytes", "profile_ensure", "profile_get",
]

[calc]
capabilities = ["send_message", "theme"]
